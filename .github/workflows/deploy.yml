name: Deploy to Veridyen

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy coming soon page
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER:   ${{ secrets.FTP_USERNAME }}
          FTP_PASS:   ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-allow no;
            set ftp:passive-mode yes;
            set net:timeout 30;
            set net:max-retries 3;
            open -u \"$FTP_USER,$FTP_PASS\" ftp://$FTP_SERVER;
            mkdir -fp yayaconstruct.com/public_html;
            put index.html -o yayaconstruct.com/public_html/index.html;
            bye
          "

      - name: Deploy WordPress theme
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER:   ${{ secrets.FTP_USERNAME }}
          FTP_PASS:   ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-allow no;
            set ftp:passive-mode yes;
            set net:timeout 30;
            set net:max-retries 3;
            open -u \"$FTP_USER,$FTP_PASS\" ftp://$FTP_SERVER;
            mkdir -fp yayaconstruct.com/public_html/wp-content/themes/yayaconstruct-theme;
            mirror --reverse --delete --parallel=5 yayaconstruct-theme/ yayaconstruct.com/public_html/wp-content/themes/yayaconstruct-theme/;
            bye
          "
